<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Interaction Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        padding: 32px;
      }

      .dash-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .dash-top {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-end;
        margin: 40px 0 24px;
      }

      .dash-title {
        font-size: clamp(2.2rem, 6vw, 5.5rem);
        line-height: .94;
        font-weight: 830;
      }

      .dash-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .dash-card, .dash-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 90px var(--shadow);
      }

      .dash-card {
        padding: 18px;
      }

      .dash-card span {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .18em;
      }

      .dash-card strong {
        display: block;
        margin-top: 10px;
        font-size: 2rem;
      }

      .dash-main {
        display: grid;
        grid-template-columns: 1.35fr .65fr;
        gap: 14px;
        margin-top: 14px;
      }

      .dash-panel {
        padding: 18px;
        min-height: 360px;
      }

      .dash-table {
        width: 100%;
        border-collapse: collapse;
      }

      .dash-table th, .dash-table td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .dash-table th {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .16em;
      }

      .answer-pill {
        display: inline-flex;
        border: 1px solid color-mix(in srgb, var(--accent-2) 52%, var(--line));
        border-radius: 999px;
        padding: 6px 10px;
        background: color-mix(in srgb, var(--accent-2) 12%, transparent);
      }

      .bar-row {
        display: grid;
        gap: 8px;
        margin: 12px 0;
      }

      .bar-label {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .bar {
        height: 10px;
        border-radius: 999px;
        background: rgba(255,255,255,.08);
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 600ms ease;
      }

      .auth-box {
        width: min(460px, 100%);
        margin: 14vh auto 0;
        padding: 24px;
      }

      .auth-box input {
        width: 100%;
        margin: 18px 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 14px 16px;
        background: rgba(255,255,255,.06);
        color: var(--text);
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 860px) {
        body {
          padding: 18px;
        }

        .dash-top, .dash-main {
          display: grid;
        }

        .dash-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="mesh" aria-hidden="true"></div>
    <main id="dashboard-root"></main>
    <script src="./supabase-config.js"></script>
    <script src="./dashboard-admin.js"></script>
  </body>
</html>
